<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  padding: 20px;
}
.container {
  background: white;
  padding: 30px;
  max-width: 700px;
  margin: auto;
}
h1 {
  font-size: 40px;
}
.row {
  display: flex;
  justify-content: space-between;
}
.label {
  font-size: 12px;
  color: gray;
}
</style>

</head>

<body>

<div class="container">
  <h1>Zertifikat</h1>
  <p>telc Deutsch B1</p>

  <div class="row">
    <div>
      <div id="name"></div>
      <div class="label">Name</div>
    </div>
    <div>
      <div id="vorname"></div>
      <div class="label">Vorname</div>
    </div>
  </div>

  <p>Summe: <span id="summe"></span></p>
  <p>Prädikat: <span id="grade"></span></p>
</div>

<script>
const data = {
  "123": {
    name: "Ali",
    vorname: "Ahmed",
    summe: "271 / 300",
    grade: "Sehr gut"
  }
};

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (data[id]) {
  document.getElementById("name").innerText = data[id].name;
  document.getElementById("vorname").innerText = data[id].vorname;
  document.getElementById("summe").innerText = data[id].summe;
  document.getElementById("grade").innerText = data[id].grade;
} else {
  document.body.innerHTML = "<h2>Keine Daten gefunden</h2>";
}
</script>

</body>
</html>
